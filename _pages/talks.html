{% assign talks = site.talks | sort: "date" | reverse %}

{% if talks.size > 0 %}
<ul>
{% for talk in talks %}
  <li><strong><a href="{{ talk.url | relative_url }}">{{ talk.title }}</a></strong></li>
{% endfor %}
</ul>
{% else %}
More talks will be added here soon.
{% endif %}
